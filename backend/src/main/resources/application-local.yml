spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/smartlab_db}
    username: ${DB_USERNAME:smartlab_user}
    password: ${DB_PASSWORD:1234}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

smartlab:
  jwt:
    secret-base64: ${SMARTLAB_JWT_SECRET_BASE64:c21hcnRsYWItbG9jYWwtZGV2ZWxvcG1lbnQtc2VjcmV0LTMyLWJ5dGVzISE=}
    access-ttl-seconds: ${SMARTLAB_JWT_ACCESS_TTL_SECONDS:900}
